<!DOCTYPE html>
<html>
<head>
    <title>AI Chat Triage</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h2>Multilingual AI Support Chat</h2>

    <form method="POST">

        <textarea class="form-control" name="message" rows="4"
        placeholder="Type message in any language..."></textarea>

        <br>

        <button class="btn btn-primary">
            Analyze
        </button>

    </form>

    <hr>

    {% if result %}

    <h4>AI Response (JSON)</h4>

    <pre class="bg-light p-3">
{{ result }}
    </pre>

    {% endif %}

</div>

</body>
</html>
