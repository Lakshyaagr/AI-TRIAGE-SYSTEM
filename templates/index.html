<!DOCTYPE html>
<html>
<head>
    <title>AI Triage System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            AI Triage System
        </a>

        <a class="btn btn-success" href="/dashboard">
            Dashboard
        </a>

        <a class="btn btn-warning" href="/chat">
            AI Chat
        </a>

    </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">

    <h1>AI Customer Support Triage</h1>

    <p class="text-muted">
        Upload a TXT, PDF, HTML, or CSV file for AI analysis.
    </p>

    <form action="/analyze"
          method="POST"
          enctype="multipart/form-data">

        <input
            type="file"
            name="file"
            class="form-control"
            required>

        <br>

        <button class="btn btn-primary">
            Analyze File
        </button>

    </form>

</div>

</body>
</html>
